<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admission Form — 10th Std — Shree Saraswati Classes</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body { font-family: Arial, Helvetica, sans-serif; background: #94a3b8; }

  /* ── Toolbar ── */
  #toolbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: #1e293b; color: #fff;
    display: flex; align-items: center; gap: 16px;
    padding: 10px 20px;
  }
  #toolbar .title { font-weight: bold; font-size: 14px; }
  #toolbar .spacer { flex: 1; }
  .btn-print {
    background: #1A56DB; color: #fff; border: none; border-radius: 6px;
    padding: 7px 18px; font-weight: bold; cursor: pointer; font-size: 14px;
  }

  /* ── Screen preview ── */
  #preview {
    padding-top: 64px; padding-bottom: 40px;
    display: flex; flex-direction: column; align-items: center; gap: 24px;
    min-height: 100vh;
  }
  .pg-label {
    font-size: 11px; color: #1e293b; font-weight: 600;
    align-self: flex-start; margin-left: calc(50% - 350px); margin-top: 8px;
  }
  .shadow { box-shadow: 0 4px 24px rgba(0,0,0,.28); }

  /* ── Page ── */
  .page {
    width: 700px; background: #fff;
    padding: 18px 22px;
    font-family: Arial, Helvetica, sans-serif;
    border: 2px solid #000;
  }

  /* ── Field rows ── */
  .fr { display: flex; align-items: flex-end; gap: 6px; margin-bottom: 9px; }
  .lbl { font-size: 12px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
  .ul  {
    flex: 1; border-bottom: 1px solid #000;
    min-height: 18px; padding-bottom: 2px;
  }

  /* ── Tables ── */
  table  { border-collapse: collapse; width: 100%; }
  td, th {
    border: 1px solid #000;
    padding: 5px 9px;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 12px;
    vertical-align: top;
  }

  /* ── Print ── */
  #po { display: none; }

  @media print {
    body     { background: #fff !important; margin: 0; padding: 0; }
    #toolbar, #preview { display: none !important; }
    #po      { display: block !important; }
    .pb      { page-break-after: always; }
    @page {
      margin: 10mm;
      size: A4 portrait;
      @top-left     { content: ""; }
      @top-center   { content: ""; }
      @top-right    { content: ""; }
      @bottom-left  { content: ""; }
      @bottom-center{ content: ""; }
      @bottom-right { content: ""; }
    }
    .page    {
      width: 100% !important;
      max-width: none !important;
      height: calc(297mm - 20mm);
      border: 2px solid #000;
      padding: 14px 18px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
  }
</style>
</head>
<body>

<!-- TOOLBAR -->

  <button class="btn-print" onclick="window.print()">&#128424; Print / Save as PDF</button>

<!-- SCREEN PREVIEW -->
<div id="preview">

<!-- PRINT OUTPUT -->
<div id="po">
  <div id="p1"></div>
  <div class="pb"></div>
  <div id="p2"></div>
</div>
